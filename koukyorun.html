<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇居ラン・タイムシミュレーション</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 320px;
            max-height: 90vh;
            overflow-y: auto;
            box-sizing: border-box; /* パディングを含めて幅を計算させる（レスポンシブで重要） */
        }

        h2 { margin: 0 0 15px 0; font-size: 18px; color: #333; border-bottom: 2px solid #007BFF; padding-bottom: 5px; }
        
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 12px; color: #666; margin-bottom: 2px; }
        .input-group input { width: calc(100% - 16px); padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; width: 100%;}
        
        button {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
            transition: background-color 0.2s;
        }
        .btn-add { background-color: #28a745; }
        .btn-add:hover { background-color: #218838; }
        .btn-start { background-color: #007BFF; margin-top: 15px; font-size: 16px; padding: 12px;}
        .btn-start:hover { background-color: #0056b3; }
        
        .btn-pause { background-color: #f39c12; margin-top: 10px; font-size: 16px; padding: 12px; display: none; }
        .btn-pause:hover { background-color: #d68910; }
        .btn-resume { background-color: #27ae60 !important; }
        .btn-resume:hover { background-color: #219150 !important; }

        button:disabled { background-color: #cccccc !important; cursor: not-allowed; }

        #runner-list { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .runner-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
        .color-box { width: 15px; height: 15px; border-radius: 50%; margin-right: 10px; border: 1px solid #333; }

        .speed-control { margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        .speed-control select { width: 100%; padding: 8px; font-size: 14px; box-sizing: border-box; }

        #timer-container {
            margin-top: 15px;
            background: #f8f9fa;
            padding: 15px 10px;
            border-radius: 5px;
            text-align: center;
            border: 1px solid #ddd;
        }
        .timer-label { font-size: 12px; color: #666; margin-bottom: 3px; font-weight: bold; }
        #simTime { font-size: 24px; font-weight: bold; color: #007BFF; line-height: 1; }
        #realTime { font-size: 16px; font-weight: bold; color: #555; line-height: 1; }

        .custom-icon {
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 11px; font-weight: bold;
            border-radius: 50%; border: 2px solid white;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
            white-space: nowrap; overflow: hidden;
            width: 40px !important; height: 40px !important;
            margin-left: -20px !important; margin-top: -20px !important;
        }

        /* =========================================
           📱 スマホ用レスポンシブ対応 (横幅768px以下)
           ========================================= */
        @media (max-width: 768px) {
            #ui-panel {
                top: auto; /* 上の固定を解除 */
                bottom: 0; /* 画面下部に固定 */
                left: 0;
                width: 100vw; /* 横幅を画面いっぱいに */
                max-height: 50vh; /* 高さの最大値を画面の半分（50%）に制限 */
                border-radius: 20px 20px 0 0; /* 上の角だけを丸くする */
                padding: 15px;
                box-shadow: 0 -4px 15px rgba(0,0,0,0.2); /* 影を上向きに変更 */
            }

            /* Leafletのロゴ（© OpenStreetMap）がパネルに隠れないように上にズラす */
            .leaflet-control-container .leaflet-bottom {
                bottom: 50vh !important;
            }

            /* スマホでは文字やボタンを少し大きくしてタップしやすくする */
            .btn-start, .btn-pause { padding: 15px; font-size: 18px; }
            #simTime { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui-panel">
        <h2>🏃‍♂️ ランナー登録</h2>
        <div class="input-group">
            <label>名前</label>
            <input type="text" id="inputName" placeholder="例: Aさん">
        </div>
        <div class="input-group">
            <label>予想タイム (分)</label>
            <input type="number" id="inputTime" placeholder="例: 25" min="1">
        </div>
        <button class="btn-add" id="addRunnerBtn">＋ ランナーを追加</button>

        <div id="runner-list"></div>

        <div class="speed-control">
            <label>⏱️ 再生速度</label>
            <select id="speedSelect">
                <option value="1">等倍速 (リアルタイム)</option>
                <option value="10">10倍速</option>
                <option value="50" selected>50倍速</option>
                <option value="100">100倍速</option>
                <option value="500">500倍速 (一瞬)</option>
            </select>
        </div>

        <button class="btn-start" id="startBtn" disabled>シミュレーション開始</button>
        <button class="btn-pause" id="pauseBtn">⏸ 一時停止</button>
        
        <div id="timer-container">
            <div class="timer-label">⏱️ シミュレーション経過時間</div>
            <div id="simTime">00:00:00</div>
            <div class="timer-label" style="margin-top: 10px;">🕒 現実のスタートからのタイマー</div>
            <div id="realTime">00:00:00</div>
        </div>
    </div>

                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                };
                return escapeList[match];
            });
        }

        const map = L.map('map').setView([35.6784555, 139.7537278], 15);

        const targetLat = 35.683366;
        const targetLng = 139.7597998;
        let startIndex = originalRouteCoords.findIndex(c => c[0] === targetLat && c[1] === targetLng);
        if (startIndex === -1) startIndex = 0;

        const routeCoords = originalRouteCoords.slice(startIndex).concat(originalRouteCoords.slice(0, startIndex));
        routeCoords.push(routeCoords[0]);

        L.polyline(routeCoords, {color: '#FF007F', weight: 6, opacity: 0.6}).addTo(map);

        let totalDistance = 0;
        const segments = [];
        for (let i = 0; i < routeCoords.length - 1; i++) {
            const p1 = L.latLng(routeCoords[i]);
            const p2 = L.latLng(routeCoords[i + 1]);
            const dist = p1.distanceTo(p2);
            totalDistance += dist;
            segments.push({ p1, p2, dist, cumulativeDist: totalDistance });
        }

        const runners = [];
        const colorPalette = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22', '#34495e'];
        let colorIndex = 0;

        const addRunnerBtn = document.getElementById('addRunnerBtn');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const runnerListDiv = document.getElementById('runner-list');

        addRunnerBtn.addEventListener('click', () => {
            const rawName = document.getElementById('inputName').value.trim();
            const time = parseFloat(document.getElementById('inputTime').value);

            if (!rawName || isNaN(time) || time <= 0) {
                alert("名前と正しいタイム（分）を入力してください。");
                return;
            }

            const name = escapeHTML(rawName); 

            const color = colorPalette[colorIndex % colorPalette.length];
            colorIndex++;

            const customIcon = L.divIcon({
                className: '',
                html: `<div class="custom-icon" style="background-color: ${color};">${name.substring(0,3)}</div>`
            });
            const marker = L.marker(routeCoords[0], {icon: customIcon}).addTo(map);

            runners.push({ name, timeMins: time, color, marker });

            const div = document.createElement('div');
            div.className = 'runner-item';
            div.innerHTML = `<div class="color-box" style="background-color: ${color};"></div> ${name} (${time}分)`;
            runnerListDiv.appendChild(div);

            document.getElementById('inputName').value = '';
            document.getElementById('inputTime').value = '';

            startBtn.disabled = false;
        });

        let isRunning = false;
        let isPaused = false;
        let animationFrameId = null; 
        
        let lastTimestamp = 0;
        let simElapsedSec = 0;
        let realElapsedSec = 0;

        function getCoordAtProgress(progress) {
            if (progress >= 1) return routeCoords[routeCoords.length - 1];
            if (progress <= 0) return routeCoords[0];

            const targetDist = totalDistance * progress;
            let prevDist = 0;

            for (let i = 0; i < segments.length; i++) {
                if (targetDist <= segments[i].cumulativeDist) {
                    const ratio = (targetDist - prevDist) / segments[i].dist;
                    const lat = segments[i].p1.lat + (segments[i].p2.lat - segments[i].p1.lat) * ratio;
                    const lng = segments[i].p1.lng + (segments[i].p2.lng - segments[i].p1.lng) * ratio;
                    return [lat, lng];
                }
                prevDist = segments[i].cumulativeDist;
            }
            return routeCoords[routeCoords.length - 1];
        }

        function formatTime(totalSeconds) {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = Math.floor(totalSeconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        startBtn.addEventListener('click', () => {
            if (isRunning) return;
            isRunning = true;
            
            startBtn.style.display = 'none'; 
            pauseBtn.style.display = 'block'; 
            addRunnerBtn.disabled = true;
            
            lastTimestamp = performance.now();
            animationFrameId = requestAnimationFrame(animate);
        });

        pauseBtn.addEventListener('click', () => {
            if (!isRunning) return;

            isPaused = !isPaused;

            if (isPaused) {
                cancelAnimationFrame(animationFrameId);
                pauseBtn.innerText = '▶ 再開';
                pauseBtn.classList.add('btn-resume');
            } else {
                lastTimestamp = performance.now();
                animationFrameId = requestAnimationFrame(animate);
                pauseBtn.innerText = '⏸ 一時停止';
                pauseBtn.classList.remove('btn-resume');
            }
        });

        function animate(currentTimestamp) {
            const deltaTimeSec = (currentTimestamp - lastTimestamp) / 1000;
            lastTimestamp = currentTimestamp;

            const speedMultiplier = parseFloat(document.getElementById('speedSelect').value);
            
            realElapsedSec += deltaTimeSec;
            simElapsedSec += deltaTimeSec * speedMultiplier;
            
            const simElapsedMins = simElapsedSec / 60;

            document.getElementById('simTime').innerText = formatTime(simElapsedSec);
            document.getElementById('realTime').innerText = formatTime(realElapsedSec);

            let allFinished = true;

            runners.forEach(runner => {
                let progress = simElapsedMins / runner.timeMins;
                if (progress < 1) {
                    allFinished = false;
                } else {
                    progress = 1;
                }
                const currentPos = getCoordAtProgress(progress);
                runner.marker.setLatLng(currentPos);
            });

            if (!allFinished) {
                animationFrameId = requestAnimationFrame(animate);
            } else {
                document.getElementById('simTime').innerText += '\n(全員ゴール!)';
                
                pauseBtn.style.display = 'none';
                startBtn.style.display = 'block';
                startBtn.innerText = 'リセット (再読込)';
                startBtn.disabled = false;
                
                startBtn.onclick = () => location.reload();
            }
        }
    </script>
</body>
</html>
